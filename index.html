<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.M Shifrator</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff3131;
            --bg-dark: #0d0d0d;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-top: 0;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #252525;
            padding: 10px;
            border-radius: 10px;
        }

        .mode-selector label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #252525;
            border: 2px solid #333;
            border-radius: 12px;
            color: var(--neon-blue);
            padding: 15px;
            box-sizing: border-box;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--neon-purple); }

        .btn-clear {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            transition: 0.3s;
        }

        .btn-clear:hover { background: var(--neon-red); color: white; }

        .result-container { position: relative; margin-top: 25px; }

        .label-tag {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn {
            position: absolute;
            top: 35px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ccc;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        #outputText { 
            color: #00ff41; 
            border-color: #1b4d26;
            background: #0a150c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>D.M Shifrator</h2>
    
    <div class="mode-selector">
        <label>
            <input type="radio" name="mode" value="encrypt" checked onchange="liveProcess()"> Шифрувати
        </label>
        <label>
            <input type="radio" name="mode" value="decrypt" onchange="liveProcess()"> Розшифрувати
        </label>
    </div>

    <span class="label-tag">Вхідні дані:</span>
    <textarea id="inputText" placeholder="Пишіть тут..." oninput="liveProcess()"></textarea>
    
    <button class="btn-clear" onclick="clearFields()">Очистити все</button>

    <div class="result-container">
        <span class="label-tag">Результат (Live):</span>
        <button class="copy-btn" onclick="copyResult()">Копіювати</button>
        <textarea id="outputText" readonly placeholder="Тут буде результат..."></textarea>
    </div>
</div>

<script>
    const charMap = {
        'а': '1', 'б': '"', 'в': '*', 'г': '(', 'ґ': ')', 'д': '.', 'е': '2', 'є': '92',
        'ж': '?', 'з': '!', 'и': '3', 'і': '4', 'ї': '94', 'й': '9', 'к': '+', 'л': '-',
        'м': '÷', 'н': '×', 'о': '5', 'п': 'π', 'р': "'", 'с': '§', 'т': '†', 'у': '6',
        'ф': '=', 'х': '≈', 'ц': '<', 'ч': '>', 'ш': '[', 'щ': ']', 'ь': '0', 'ю': '96', 'я': '91', ' ': '_'
    };

    const sortedTokens = Object.keys(charMap)
        .map(key => ({ char: key, code: charMap[key] }))
        .sort((a, b) => b.code.length - a.code.length);

    function liveProcess() {
        const input = document.getElementById('inputText').value.toLowerCase();
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let result = '';

        if (mode === 'encrypt') {
            for (let char of input) {
                result += charMap[char] !== undefined ? charMap[char] : char;
            }
        } else {
            let i = 0;
            while (i < input.length) {
                let found = false;
                for (let token of sortedTokens) {
                    if (input.substr(i, token.code.length) === token.code) {
                        result += token.char;
                        i += token.code.length;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    result += input[i];
                    i++;
                }
            }
        }
        document.getElementById('outputText').value = result;
    }

    function clearFields() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
    }

    function copyResult() {
        const copyText = document.getElementById("outputText");
        if (!copyText.value) return;
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "Готово!";
        setTimeout(() => btn.innerText = "Копіювати", 1500);
    }
</script>

</body>
</html>
